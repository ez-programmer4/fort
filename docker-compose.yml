services:
  db:
    image: postgres:16-alpine
    container_name: fortinventory-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: fort
      POSTGRES_PASSWORD: fortpass
      POSTGRES_DB: fortinventory
    ports:
      # 5434 on host — native PostgreSQL 17 occupies 5432, wslrelay holds 5433
      - "5434:5432"
    volumes:
      - fort_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fort -d fortinventory"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  fort_pgdata:
